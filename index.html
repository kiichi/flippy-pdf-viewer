<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flippy</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" id="app">
        <input id="fileInput" type="file" accept="application/pdf,.pdf" hidden />
        <div class="drop-overlay" id="dropOverlay" aria-hidden="true">
          <div class="drop-card">Drop PDF to open</div>
        </div>
        <div class="book" id="book" aria-live="polite">
          <div class="spread spread-base">
            <div class="page page-left" id="leftPage"></div>
            <div class="page page-right" id="rightPage"></div>
          </div>

          <div class="flip-sheet hidden" id="flipSheet" aria-hidden="true">
            <div class="flip-face" id="flipFront"></div>
            <div class="flip-face flip-back" id="flipBack"></div>
          </div>
        </div>

        <div class="loading-panel" id="loadingPanel">
          <div class="spinner"></div>
          <p id="loadingText">Loading sample.pdf...</p>
          <button id="selectFileButton" class="select-file-button hidden" type="button">
            Choose PDF
          </button>
        </div>

        <aside class="side-panel" id="sidePanel" aria-hidden="true">
          <p class="side-panel-title">Flippy</p>
          <div class="side-panel-header">
            <p class="side-panel-label" id="sidePanelLabel">sample.pdf</p>
            <button
              id="sidePanelCloseButton"
              class="side-panel-close"
              type="button"
              aria-label="Close panel"
              title="Close panel"
            >
              <span aria-hidden="true">✕</span>
            </button>
          </div>
          <p class="side-panel-file" id="fileNameText">sample.pdf</p>
          <div class="side-panel-actions">
            <button id="uploadButton" type="button">Upload PDF</button>
            <a id="downloadLink" href="./sample.pdf" download="sample.pdf">Download PDF</a>
            <a id="downloadAppLink" href="./flippy-webapp.zip" download="flippy-webapp.zip">
              Download Entire Package
            </a>
          </div>
          <button id="shareButton" type="button">Share</button>
          <label class="side-panel-embed" for="embedCode">
            <span class="side-panel-label">Embed Code</span>
            <textarea
              id="embedCode"
              readonly
              spellcheck="false"
              aria-label="Embed code"
            ></textarea>
          </label>
          <button id="copyEmbedButton" type="button">Copy Embed Code</button>
          <p class="side-panel-feedback" id="panelFeedback" aria-live="polite"></p>
        </aside>

        <section class="controls" id="controls">
          <div class="controls-row">
            <button
              id="controlsToggleButton"
              class="controls-toggle"
              type="button"
              aria-label="Open panel"
              title="Open panel"
            >
              <span aria-hidden="true">☰</span>
            </button>
            <button id="prevButton" type="button" aria-label="Previous page" title="Previous page">
              <span aria-hidden="true">◀</span>
            </button>
            <input
              id="spreadSlider"
              type="range"
              min="0"
              max="0"
              value="0"
              step="1"
              aria-label="Jump to spread"
            />
            <button id="nextButton" type="button" aria-label="Next page" title="Next page">
              <span aria-hidden="true">▶</span>
            </button>
            <button
              id="fullscreenButton"
              type="button"
              aria-label="Enter fullscreen"
              title="Enter fullscreen"
            >
              <span aria-hidden="true">⛶</span>
            </button>
            <p class="status" id="statusText">Loading...</p>
          </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.min.mjs" type="module"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
